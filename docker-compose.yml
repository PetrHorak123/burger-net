services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: burgerdb
      POSTGRES_USER: burger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-burger}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burger -d burgerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://burger:${POSTGRES_PASSWORD:-burger}@db:5432/burgerdb
      ADMIN_PIN: ${ADMIN_PIN}

volumes:
  pgdata:
